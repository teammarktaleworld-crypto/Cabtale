name: ride_sharing_user_app
description: A ride sharing Flutter project.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  connectivity_plus: ^7.0.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  country_code_picker: ^3.4.1
  dotted_border: ^3.1.0
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.0
  flutter_html: ^3.0.0-beta.2
  pin_code_fields: ^9.1.0
  flutter_svg: ^2.0.10+1
  shimmer_animation: ^2.2.1
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  syncfusion_flutter_datepicker: ^32.2.7
  google_maps_flutter: ^2.7.0
  geolocator: ^14.0.2
  flutter_animarker: ^3.2.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  loading_overlay_pro: ^2.1.1
  modal_bottom_sheet: ^3.0.0
  flutter_widget_from_html_core: ^0.17.0
  flutter_typeahead: ^5.2.0
  dotted_line: ^3.2.2
  autocomplete_textfield: ^2.0.1
  flutter_inappwebview: ^6.1.5
  firebase_crashlytics: ^5.0.7
  screenshot: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  dart_pusher_channels: ^1.2.2+1
  flutter_switch: ^0.3.2
  just_the_tooltip: ^0.0.12
  speech_to_text: ^7.0.0
  app_links: ^6.3.2
  share_plus: ^12.0.1
  flutter_phone_direct_caller: ^2.2.1
  gauge_indicator: ^0.4.3
  video_player: ^2.10.0
  animated_text_kit: ^4.2.3
  smooth_page_indicator: ^2.0.1

dependency_overrides:
  flutter_inappwebview_ios:
    git:
      url: https://github.com/andychucs/flutter_inappwebview
      ref: master
      path: flutter_inappwebview_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/image/logo.png"
  image_path: "assets/image/logo.png"

flutter_icons:
  android: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/image/logo.png"
  image_path: "assets/image/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/svg/
    - assets/map/
    - assets/animation/

  fonts:
    - family: SFProText
      fonts:
        - asset: assets/font/sf-pro-text-light.ttf
          weight: 300
        - asset: assets/font/sf-pro-text-regular.ttf
          weight: 400
        - asset: assets/font/sf-pro-text-medium.ttf
          weight: 500
        - asset: assets/font/sf-pro-text-semibold.ttf
          weight: 600
        - asset: assets/font/sf-pro-text-bold.ttf
          weight: 700
        - asset: assets/font/sf-pro-text-heavy.ttf
          weight: 900

